<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Parliament Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Full-screen canvas -->
    <canvas width="800" height="400" id="canvas"></canvas>

    <!-- Top left logo/menu -->
    <div id="logo">
        <h1>Parliament Viewer</h1>

        <select id="select-timeline" autocomplete="off">
            <optgroup label="Europe">
                <option value="be_federalparliament">Belgium - Federaal Parlement/Parlement Fédéral</option>
                <option value="dk_folketing">Denmark - Folketing</option>
                <option value="de_bundestag">Germany - Bundestag</option>
                <option value="eu_parliament">European Union - European Parliament</option>
                <option value="fi_eduskunta">Finland - Eduskunta</option>
                <option value="hu_orszaggyules">Hungary - Országgyűlés</option>
                <option value="nl_eerstekamer">Netherlands - Eerste Kamer</option>
                <option value="nl_tweedekamer" selected>Netherlands - Tweede Kamer</option>
                <option value="no_storting">Norway - Storting</option>
                <option value="se_riksdag">Sweden - Riksdag</option>
                <option value="uk_houseofcommons">United Kingdom - House of Commons</option>
            </optgroup>
            <optgroup label="North America">    
                <option value="us_houseofrepresentatives">United States - House of Representatives</option>
                <option value="us_senate">United States - Senate</option>
            </optgroup>
            <optgroup label="Oceania">
                <option value="nz_houseofrepresentatives">New Zealand - House of Representatives</option>
            </optgroup>
        </select>
    </div>

    <!-- Right sidebar -->
    <div id="sidebar">
        <button id="prev_btn" onclick="prev()" class="wide">Previous</button>
        <button id="next_btn" onclick="next()" class="wide rbutton">Next</button>
        <h1 id="title"></h1>
        <div id="table"></div>
        <div id="left_plm"></div>
        <button id="edit_btn" onclick="table_edit_mode()"><span class="icon edit"></span></button>
        <button id="reset_btn" onclick="table()" disabled><span class="icon reset"></span></button>
        <button id="add_btn" disabled><span class="icon add"></span></button>
        <button id="delete_btn" disabled><span class="icon delete"></span></button>
        <button id="left_btn" disabled><span class="icon left"></span></button>
        <button id="right_btn" disabled><span class="icon right"></span></button>
        <hr>
        <div class="small" id="links">
            View this project on <a target="#" href="https://github.com/Simon3995/ParliamentViewer">GitHub</a>
        </div>
    </div>

    <!-- temporary, debugging -->
    <div id="offscreen"></div>
</body>

</html>

    crossorigin="anonymous"></script>
