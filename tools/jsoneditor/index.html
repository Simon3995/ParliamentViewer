<!DOCTYPE html>
<html>
    <head>
        <title>JSON Editor</title>
        <style>
            * {
                font-family: monospace;
                font-size: 16px;
                margin: 0;
            }
            body {
                padding: 20px;
                background-color: #222;
                color: white;
            }
            p {
                margin: 0px 30px;
            }
            .party {
                background-color: #fff2;
                margin-bottom: 10px;
                position: relative;
            }
            .indent {
                margin-left: 120px;
            }
            input[type=text] {
                width: 400px;
            }
            input[type=color] {
                border: none;
                padding: 0;
                height: 20px;
                vertical-align: middle;
            }
            img {
                height: 100px;
                width: 100px;
                border-radius: 50px;
                border: none;
                background-color: white;
                position: absolute;
                top: 10px;
                left: 10px;
            }
        </style>
    </head>
    <body>
        <button>EXPORT JSON</button>
        <button>IMPORT JSON</button>
        <br><br>

        <h1>GENERAL INFO</h1>
        <p>Name (e.g. nl_tweedekamer): <input id="name"></p>
        <br>

        <h1>PARTIES</h1>
        <div id="parties"></div>
        <button onclick="add_party()">ADD PARTY</button>
        <br><br>

        <h1>PARLIAMENTS</h1>
        <div id="parliaments"></div>
        <button onclick="add_plm()">ADD PARLIAMENT</button>
        <br><br>
    </body>
</html>

<script type="text/javascript">
    const div_parties = document.getElementById("parties");
    const div_plms = document.getElementById("parliaments");
    let parties = [];

    // find the lowest unused party index
    function new_party_index() {
        let id = 0;
        while (parties[id]) id++;
        return id;
    }
    
    // add a party adding menu to the DOM
    // add new party entry in the parties array
    function add_party() {
        const id = new_party_index();
        parties[id] = {
            id: null,
            name: null,
            fullname: null,
            color: null,
            image: null,
        }
        
        let str = `
            <div id="${id}" class="party">
                <div class="indent">
                    Unique ID: <input type="text" oninput="parties[${id}].id = this.value"><br>
                    Short Name: <input type="text" oninput="parties[${id}].name = this.value"><br>
                    Full Name: <input type="text" oninput="parties[${id}].fullname = this.value"><br>
                    Color: <input type="color" oninput="parties[${id}].color = this.value"><br>
                    Image SRC: <input type="text" oninput="parties[${id}].image = this.value"><br>
                </div>
                <button onclick="delete_party(${id})">DELETE PARTY</button>
                <img src=""><br>
            </div>
        `;

        div_parties.insertAdjacentHTML('beforeend', str);
    }

    // remove party from the DOM and from the parties array
    function delete_party(id) {
        const p = parties[id];
        if (confirm(`Remove party?\n\tid: ${p.id}\n\tname: ${p.name}\n\tfullname: ${p.fullname}`)) {
            document.getElementById(id).remove();
            delete parties[id];
        }
    }
</script>
