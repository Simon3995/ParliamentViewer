<!DOCTYPE html>
<html>
    <head>
        <style>
            canvas {
                border: 1px solid black;
            }
            input {
                vertical-align: middle;
                height: 20px;
                border: none;
                padding: 0;
            }
            p {
                line-height: 20px;
                margin: 0;
                font-family: 'Courier New', Courier, monospace;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas" width="400" height="400"></canvas>
        <p>Main Circle Color: <input id="main_col" type="color" autocomplete="off"></p>
        <p><input id="use_sec" type="checkbox" autocomplete="off"> Use Secondary Circle</p>
        <p>Secondary Circle Color: <input id="sec_col" type="color" autocomplete="off" value="#ffffff"></p>
        <p>Secondary Circle Radius: <input id="sec_rat" type="range" min="0.5" max="1" step="0.02" autocomplete="off"></p>
    </body>
</html>

<script type="text/javascript">
    const c = document.getElementById("canvas");
    const ctx = c.getContext("2d");
    let logo = new Image();
    let main_col = document.getElementById("main_col").value;
    let use_sec = document.getElementById("use_sec").checked;
    let sec_col = document.getElementById("sec_col").value;
    let sec_rat = document.getElementById("sec_rat").value;

    update();
    
    function update() {
        draw_transparent_checkerboard();
        draw_main_circle();
        if (use_sec) draw_secondary_circle();
        draw_logo();
        requestAnimationFrame(update);
    }

    function draw_transparent_checkerboard() {
        const scale = 20;
        for (let i=0; i<=c.width/scale; i++) {
            for (let j=0; j<=c.height/scale; j++) {
                ctx.fillStyle = ((i+j)%2) ? "#ffffff" : "#eeeeee";
                ctx.fillRect(scale*i, scale*j, scale, scale);
            }
        }
    }

    function draw_main_circle() {
        ctx.fillStyle = main_col;
        ctx.beginPath();
        ctx.arc(c.width/2, c.height/2, c.width/2, 0, 2*Math.PI);
        ctx.fill();
    }

    function draw_secondary_circle() {
        ctx.fillStyle = sec_col;
        ctx.beginPath();
        ctx.arc(c.width/2, c.height/2, sec_rat*c.width/2, 0, 2*Math.PI);
        ctx.fill();
    }

    function draw_logo() {
        let scale_factor = (logo.width > logo.height) ? c.width/logo.width : c.height/logo.height;
        ctx.drawImage(
            logo,
            c.width/2 - scale_factor * logo.width/2,
            c.height/2 - scale_factor * logo.height/2,
            scale_factor * logo.width,
            scale_factor * logo.height
        );
    }

    window.addEventListener("paste", function(e) {
        const clip_data = e.clipboardData;
        if (clip_data.files.length > 0) {
            const file = clip_data.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                logo.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            const url = clip_data.getData("text/plain");
            if (url && (url.startsWith("http"))) {
                logo.crossOrigin = "Anonymous";
                logo.src = url;
            }
        }
    });

    document.getElementById("main_col").addEventListener("input", function(e) {
        main_col = e.target.value;
    });

    document.getElementById("sec_col").addEventListener("input", function(e) {
        sec_col = e.target.value;
    });

    document.getElementById("use_sec").addEventListener("input", function(e) {
        use_sec = e.target.checked;
    });

    document.getElementById("sec_rat").addEventListener("input", function(e) {
        sec_rat = e.target.value;
    });
</script>
