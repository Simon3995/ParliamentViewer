<!DOCTYPE html>
<html>
    <head>
        <style>
            canvas {
                border: 1px solid black;
                user-select: none;
            }
            input {
                vertical-align: middle;
                height: 20px;
                border: none;
                padding: 0;
            }
            input[type=range] {
                width: 300px;
            }
            input[type=color] {
                width: 150px;
            }
            p, button {
                line-height: 20px;
                margin: 0;
                font-family: 'Courier New', Courier, monospace;
                font-size: 16px;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas" width="400" height="400"></canvas>
        <button onclick="reset_logo()">Reset Logo Scale + Offset</button>
        <p>Main Circle Color: <input id="main_col" type="color" autocomplete="off"></p>
        <p><label><input id="use_sec" type="checkbox" autocomplete="off"> Use Secondary Circle</label></p>
        <p>Secondary Circle Color: <input id="sec_col" type="color" autocomplete="off" value="#ffffff"></p>
        <p>Secondary Circle Radius: <input id="sec_rat" type="range" min="0.5" max="1" step="0.01" autocomplete="off"></p>
        <p>Logo BG Color: <input id="bg_col" type="color" autocomplete="off"></p>
        <p>Logo BG Erase Threshold: <input id="bg_thres" type="range" min="0" max="255" step="0.1" autocomplete="off"></p>
        <p><label><input id="whiteout" type="checkbox" autocomplete="off"> Whiteout</label></p>
        <p><label><input id="blackout" type="checkbox" autocomplete="off"> Blackout</label></p>
        <p><label><input id="invert" type="checkbox" autocomplete="off"> Invert</label></p>
        <p><label><input id="grayscale" type="checkbox" autocomplete="off"> Grayscale</label></p>
        <button onclick="export_img()">Export Image</button>
    </body>
</html>

<script type="text/javascript">
    const c = document.getElementById("canvas");
    const ctx = c.getContext("2d");
    const oc = document.createElement("canvas");
    const octx = oc.getContext("2d");
    let oc_sweep = 0;
    let logo = new Image();
    let offset_x = 0;
    let offset_y = 0;
    let logo_scale = 1;
    let mouse_down = false;
    let main_col = document.getElementById("main_col").value;
    let use_sec = document.getElementById("use_sec").checked;
    let sec_col = document.getElementById("sec_col").value;
    let sec_rat = Number(document.getElementById("sec_rat").value);
    let bg_col = document.getElementById("bg_col").value;
    let bg_thres = Number(document.getElementById("bg_thres").value);
    let whiteout = document.getElementById("whiteout").checked;
    let blackout = document.getElementById("blackout").checked;
    let invert = document.getElementById("invert").checked;
    let grayscale = document.getElementById("grayscale").checked;

    update();
    
    function update() {
        draw_transparent_checkerboard();
        draw_main_circle();
        if (use_sec) draw_secondary_circle();
        process_offscreen_logo();
        draw_logo();
        requestAnimationFrame(update);
    }

    function draw_transparent_checkerboard() {
        const scale = 20;
        for (let i=0; i<=c.width/scale; i++) {
            for (let j=0; j<=c.height/scale; j++) {
                ctx.fillStyle = ((i+j)%2) ? "#ffffff" : "#eeeeee";
                ctx.fillRect(scale*i, scale*j, scale, scale);
            }
        }
    }

    function draw_main_circle() {
        ctx.fillStyle = main_col;
        ctx.beginPath();
        ctx.arc(c.width/2, c.height/2, c.width/2, 0, 2*Math.PI);
        ctx.fill();
    }

    function draw_secondary_circle() {
        ctx.fillStyle = sec_col;
        ctx.beginPath();
        ctx.arc(c.width/2, c.height/2, sec_rat*c.width/2, 0, 2*Math.PI);
        ctx.fill();
    }

    function draw_logo() {
        let scale_factor = (oc.width > oc.height) ? c.width/oc.width : c.height/oc.height;
        scale_factor *= logo_scale;
        ctx.drawImage(
            oc,
            c.width/2 - scale_factor * oc.width/2 + offset_x,
            c.height/2 - scale_factor * oc.height/2 + offset_y,
            scale_factor * oc.width,
            scale_factor * oc.height
        );
    }

    function hex2rgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    }

    function rgb2hex(r, g, b) {
        return "#" + component2hex(r) + component2hex(g) + component2hex(b);
    }

    function component2hex(c) {
        var hex = c.toString(16);
        return hex.length == 1 ? "0" + hex : hex;
    }

    function init_offscreen_logo() {
        const max_dim = 200;
        const scale_factor = (logo.width > logo.height) ? ((logo.width > max_dim) ? max_dim/logo.width : 1) : ((logo.height > max_dim) ? max_dim/logo.height : 1);
        [oc.width, oc.height] = [logo.width * scale_factor, logo.height * scale_factor];
        octx.drawImage(logo, 0, 0, oc.width, oc.height);
        oc_sweep = 0;
    }

    function process_offscreen_logo() {
        if (oc_sweep > oc.width) return;
        // erase all pixels that are too close to bg color
        const bg = hex2rgb(bg_col);
        for (let j=0; j<oc.height; j++) {
            const cur_col = octx.getImageData(oc_sweep, j, 1, 1).data;
            const dist = Math.hypot(cur_col[0]-bg.r, cur_col[1]-bg.g, cur_col[2]-bg.b)
            if (dist < bg_thres) {
                octx.clearRect(oc_sweep, j, 1, 1);
            } else {
                if (cur_col[4] < 20) continue;

                if (whiteout) {
                    octx.globalAlpha = cur_col[4] / 255;
                    octx.fillStyle = "white";
                    octx.fillRect(oc_sweep, j, 1, 1);
                    octx.globalAlpha = 1;
                } else if (blackout) {
                    octx.globalAlpha = cur_col[4] / 255;
                    octx.fillStyle = "black";
                    octx.fillRect(oc_sweep, j, 1, 1);
                    octx.globalAlpha = 1;
                }

                if (invert) {
                    octx.fillStyle = `rgba(${255-cur_col[0]}, ${255-cur_col[1]}, ${255-cur_col[2]}, 1.0)`;
                    octx.fillRect(oc_sweep, j, 1, 1);
                }

                if (grayscale) {
                    octx.fillStyle = `rgba(${cur_col[0]}, ${cur_col[0]}, ${cur_col[0]}, 1.0)`;
                    octx.fillRect(oc_sweep, j, 1, 1);
                }
            }
        }

        oc_sweep++;
    }

    function export_img() {
        ctx.clearRect(0, 0, c.width, c.height);
        if (use_sec) draw_secondary_circle();
        draw_logo();
        let downloadLink = document.createElement('a');
        downloadLink.setAttribute('download', 'logo.png');
        let dataURL = c.toDataURL('image/png');
        let url = dataURL.replace(/^data:image\/png/,'data:application/octet-stream');
        downloadLink.setAttribute('href', url);
        downloadLink.click();
    }

    window.addEventListener("paste", async function(e) {
        const clip_data = e.clipboardData;
        if (clip_data.files.length > 0) {
            const file = clip_data.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                logo.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            const url = clip_data.getData("text/plain");
            if (url && (url.startsWith("http"))) {
                logo.crossOrigin = "Anonymous";
                logo.src = url;
            }
        }

        setTimeout(init_offscreen_logo, 100);
    });

    function reset_logo() {
        offset_x = 0;
        offset_y = 0;
        logo_scale = 1;
    }

    document.getElementById("main_col").addEventListener("input", function(e) {
        main_col = e.target.value;
    });

    document.getElementById("sec_col").addEventListener("input", function(e) {
        sec_col = e.target.value;
    });

    document.getElementById("use_sec").addEventListener("input", function(e) {
        use_sec = e.target.checked;
    });

    document.getElementById("sec_rat").addEventListener("input", function(e) {
        sec_rat = Number(e.target.value);
    });

    document.getElementById("bg_col").addEventListener("change", function(e) {
        bg_col = e.target.value;
        init_offscreen_logo();
    });

    document.getElementById("bg_thres").addEventListener("change", function(e) {
        bg_thres = Number(e.target.value);
        init_offscreen_logo();
    });

    document.getElementById("whiteout").addEventListener("input", function(e) {
        whiteout = e.target.checked;
        init_offscreen_logo();
    });

    document.getElementById("blackout").addEventListener("input", function(e) {
        blackout = e.target.checked;
        init_offscreen_logo();
    });

    document.getElementById("grayscale").addEventListener("input", function(e) {
        grayscale = e.target.checked;
        init_offscreen_logo();
    });

    document.getElementById("invert").addEventListener("input", function(e) {
        invert = e.target.checked;
        init_offscreen_logo();
    });

    c.onmousedown = (e) => { mouse_down = true; }
    window.onmouseup = (e) => { mouse_down = false; }
    window.onmousemove = (e) => {
        if (mouse_down) {
            offset_x += e.movementX;
            offset_y += e.movementY;
        }
    }
    c.onwheel = (e) => {
        logo_scale *= 1.01**(e.deltaY/60);
    }
</script>
