<!DOCTYPE html>
<html>
    <head>
        <title>JSON Editor</title>
        <style>
            * {
                font-family: monospace;
                font-size: 16px;
                margin: 0;
            }
            body {
                padding: 20px;
                background-color: #222;
                color: white;
            }
            p {
                margin: 0px 30px;
            }
            .party {
                background-color: #fff2;
                margin-bottom: 10px;
            }
            input[type=color] {
                border: none;
                padding: 0;
                height: 20px;
                vertical-align: middle;
            }
            img {
                height: 100px;
                width: 100px;
                border-radius: 50px;
                border: none;
                background-color: white;
            }
        </style>
    </head>
    <body>
        <button>EXPORT JSON</button>
        <button>IMPORT JSON</button>
        <br><br>

        <h1>GENERAL INFO</h1>
        <p>Name (e.g. nl_tweedekamer): <input id="name"></p>
        <br>

        <h1>PARTIES</h1>
        <div id="parties"></div>
        <button onclick="add_party()">ADD PARTY</button>
        <br><br>

        <h1>PARLIAMENTS</h1>
        <div id="parliaments"></div>
        <button onclick="add_plm()">ADD PARLIAMENT</button>
        <br><br>
    </body>
</html>

<script type="text/javascript">
    const div_parties = document.getElementById("parties");
    const div_plms = document.getElementById("parliaments");
    let parties = [];

    // find the lowest unused party index
    function new_party_index() {
        let id = 0;
        while (parties[id]) id++;
        return id;
    }
    
    function add_party() {
        let str = '<div class="party">';
        str += `<p>`;
        str += `Unique ID: <input><br>`;
        str += `Short Name: <input><br>`;
        str += `Full Name: <input><br>`;
        str += `Color: <input value="#ff0000" type="color"><br>`;
        str += `Image: <input type="file"><br>`;
        str += `<img src=""><br>`;
        str += `<button>DELETE PARTY</button> `;
        str += `</div>`
        div_parties.innerHTML += str;
    }
</script>
