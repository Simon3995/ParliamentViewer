<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Parliament Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Full-screen canvas -->
    <canvas width="800" height="400" id="canvas"></canvas>

    <!-- Top left logo/menu -->
    <div id="logo">
        <h1>Parliament Viewer</h1>

        <select id="select-timeline" autocomplete="off">
            <option value="" selected disabled hidden>=== Select Parliament ===</option>
            <optgroup label="Europe">
                <!-- <option value="be_federalparliament">Belgium - Federaal Parlement/Parlement Fédéral</option> -->
                <!-- <option value="dk_folketing">Denmark - Folketing</option> -->
                <!-- <option value="de_bundestag">Germany - Bundestag</option> -->
                <!-- <option value="eu_parliament">European Union - European Parliament</option> -->
                <!-- <option value="fi_eduskunta">Finland - Eduskunta</option> -->
                <!-- <option value="hu_orszaggyules">Hungary - Országgyűlés</option> -->
                <!-- <option value="nl_eerstekamer">Netherlands - Eerste Kamer</option> -->
                <!-- <option value="nl_tweedekamer">Netherlands - Tweede Kamer</option> -->
                <option value="no_storting">Norway - Storting</option>
                <!-- <option value="se_riksdag">Sweden - Riksdag</option> -->
                <!-- <option value="uk_houseofcommons">United Kingdom - House of Commons</option> -->
            </optgroup>
            <optgroup label="North America">
                <!-- <option value="us_houseofrepresentatives">United States - House of Representatives</option> -->
                <!-- <option value="us_senate">United States - Senate</option> -->
            </optgroup>
            <optgroup label="Oceania">
                <!-- <option value="nz_houseofrepresentatives">New Zealand - House of Representatives</option> -->
            </optgroup>
        </select>
    </div>

    <!-- Right sidebar -->
    <div id="sidebar">
        <button id="btn_prev" onclick="prev()" class="wide">Previous</button>
        <button id="btn_next" onclick="next()" class="wide rbutton">Next</button>
        <h1 id="title"></h1>
        <div id="table"></div>
        <div id="left_plm"></div>
        <button title="Edit Mode" id="btn_edit" onclick="toggle_edit_mode()"><span class="icon edit"></span></button>
        <button title="Add Party" id="btn_add" disabled><span class="icon add"></span></button>
        <button title="Delete Selected" id="btn_del" onclick="delete_hlt()" disabled><span class="icon delete"></span></button>
        <button title="Move Party Left" id="btn_left" disabled><span class="icon left"></span></button>
        <button title="Move Party Right" id="btn_right" disabled><span class="icon right"></span></button>
        <button title="Sort Table" id="btn_sort" onclick="sort_table_by_seats()" disabled><span class="icon sort"></span></button>
        <hr>
        <div class="small" id="links">
            View this project on <a target="#" href="https://github.com/Simon3995/ParliamentViewer">GitHub</a>
        </div>
    </div>
</body>

</html>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js"
    integrity="sha256-mblSWfbYzaq/f+4akyMhE6XELCou4jbkgPv+JQPER2M=" crossorigin="anonymous"></script>

<script src="geometry.js"></script>
<script src="classes.js"></script>
<script src="main.js"></script>
